[tools]
deno = "2.9.1"
python = "3.14.6"
uv = "0.9.5"

[tasks.test-spec]
description = "Run pytest"
run = "uv run --with pytest pytest -q"

[tasks.test-deno]
description = "Run Deno tests"
run = "deno task test"

[tasks.check-deno]
description = "Type-check Deno code"
run = "deno task check"

[tasks.test]
description = "Run all tests"
depends = ["test-spec", "check-deno", "test-deno"]
